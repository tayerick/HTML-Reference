<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Semantic HTML Form</title>
</head>
<body>

<header>
    <h1>Advanced Registration Portal</h1>
    <p>Fill out the boxes below.</p>
</header>
<main>
    <form action="/upload" method="POST" enctype="multipart/form-data" novalidate>
        <fieldset>
            <legend>Identity and Security</legend>
            <section>
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="full-name" placeholder="Enter Full Name Here" required minlength="2">
            </section>

            <section>
                <label for="user-email">Email Address:</label>
                <input type="email" id="user-email" name="user-email" placeholder="email@example.com">
            </section>

            <section>
                <label for="new-password">Create Password</label>
                <input type="password" id="new-password" name="new-password" placeholder="Create Password" require minlength="6" maxlength="20">
            </section>
        </fieldset>

        <fieldset>
            <legend>Contact Details</legend>

            <section>
                <label for="user-site">Personal Website (URL):</label>
                <input type="url" id="user-site" name="user-site" placeholder="https://">
            </section>

            <section>
                <label for="user-tel">Phone Number:</label>
                <input type="tel" id="user-tel" name="user-tel" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
            </section>

            <section>
                <label for="fav-topic">Search Interests:</label>
                <input type="search" id="fav-topic" name="fav-topic" list="topic-options">
                <datalist id="topic-options">
                    <option value="Reloading Tips"></option>
                    <option value="Competitive Shooting"></option>
                    <option value="Aerodynamics of Bullets"></option>
                </datalist>
            </section>
        </fieldset>

        <fieldset>
            <legend>Timeline & Coordination</legend>
            <section>
                <label for="date-val">Date:</label>
                <input type="date" id="date-val" name="date-val">
            </section>
            <section>
                <label for="time-val">Time:</label>
                <input type="time" id="time-val" name="time-val">
            </section>
            <section>
                <label for="dt-local">Local Meeting:</label>
                <input type="datetime-local" id="dt-local" name="dt-local">
            </section>
            <section>
                <label for="month-val">Peferred Month:</label>
                <input type="month" id="month-val" name="month-val">
            </section>
            <section>
                <label for="week-val">Work Week:</label>
                <input type="week" id="week-val" name="week-val">
            </section>
        </fieldset>

        <fieldset>
            <legend>Preferences and Files</legend>

            <section>
                <label for="color-pick">Color:</label>
                <input type="color" id="color-pick" name="color-pick" value="#3498db">
            </section>

            <section>
                <label for="qty">Quantity (1-50, increments of 5):</label>
                <input type="number" id="qty" name="qty" min="0" max="50" step="5">
            </section>

            <section>
                <label for="volume">Volume Level:</label>
                <input type="range" id="volume" name="volume" min="0" max="100">
                <output>50</output>
            </section>

            <section>
                <label for="files-upload">Attachments:</label>
                <input type="file" id="files-upload" name="files-upload" accept=".pdf, image/*" multiple>
            </section>
        </fieldset>
        <fieldset>
            <legned>Selections and Feedback</legned>

            <section>
                <label for="category">Shooting Category:</label>
                <select id="category" name="category">
                    <optgroup label="Type Shooting">
                        <option value="Extreme Long Range" selected>Extreme Long Range</option>
                        <option value="Three Gun">Three Gun</option>
                        <option value="USPSA">USPSA</option>
                    </optgroup>
                </select>
            </section>

            <section>
                <p>Notifications:</p>
                <label>
                    <input type="checkbox" name="alert" value="email" checked> Email
                </label>
                <label>
                    <input type="checkbox" name="alert" value="sms"> SMS
                </label>

                <p>Membership Tier:</p>
                <label>
                    <input type="radio" name="tier" value="free"> Free
                </label>
                <label>
                    <input type="radio" name="tier" value="pro"> Pro
                </label>
            </section>

            <section>
                <label for="comments">Additional Comments:</label>
                <textarea id="comments" name="comments" rows="5" cols="30" maxlength="500"></textarea>
            </section>
        </fieldset>

        <fieldset>
            <legend>System Status</legend>

            <section>
                <label>Storage Health:</label>
                <meter min="0" max="100" low="25" high="75" optimum="10" value="85"></meter>
            </section>

            <section>
                <label>Sync Status:</label>
                <progress value="40" max="100"></progress>
            </section>
        </fieldset>

        <fieldset>
            <legend>Form Submission</legend>
            <section>
                <button type="submit">Button Submit</button>
                <button type="reset">Button Reset</button>
                <button type="button">Button Neutral</button>
            </section>

            <section>
                <input type="submit" value="Input Submit">
                <input type="reset" value="Input Reset">
                <input type="button" value="Input Button">
            </section>

            <section>
                <p>Submit via Image:</p>
                <input type="image" src="https://via.placeholder.com/120x45?text=Click+to+Submit" alt="Submit Button">
            </section>
        </fieldset>
    </form>
</main>
</body>

</html>

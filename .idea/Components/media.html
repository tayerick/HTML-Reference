<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Elements Practice</title>
</head>
<body>
<header>
    <h1>Media Showcase</h1>
</header>
<main>
    <section>
        <h2>Standard Image & Figures</h2>
        <figure>
            <img src="" alt="" width="" height="">
            <figcaption><!--Insert Caption of Image Here--></figcaption>
        </figure>
    </section>

    <hr>

    <section>
        <h2>Responsive Pictures</h2>
        <picture>
            <source media="(min-width: 800px)" srcset="DeskTopImage.jpeg">
            <source media="(min-width: 500px)" srcset="Portrait.jpeg">
            <img src="UniqueBackGround.webp" alt="Image of sunset over beach." width="400" height="600">
        </picture>
    </section>
</main>
</body>

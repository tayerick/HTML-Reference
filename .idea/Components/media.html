<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Elements Practice</title>
</head>
<body>
<header>
    <h1>Media Showcase</h1>
</header>
<main>
    <section>
        <h2>Standard Image & Figures</h2>
        <figure>
            <img src="" alt="" width="" height="">
            <figcaption><!--Insert Caption of Image Here--></figcaption>
        </figure>
    </section>

    <hr>

    <section>
        <h2>Responsive Pictures</h2>
        <picture>
            <source media="(min-width: 800px)" srcset="/Images/DeskTopImage.jpeg">
            <source media="(min-width: 400px)" srcset="/Images/Portrait.jpeg">
            <img src="/Images/UniqueBackGround.webp" alt="Image of sunset over beach." width="300" height="600">
        </picture>
    </section>

    <hr>

    <section>
        <h2>External Embeds</h2>
        <iframe width="560" height="315" src="https://youtu.be/8YonZoADMyI?si=LQkdzXJb565Rp0gi" frameborder="0" allowfullscreen></iframe>

        <br>

        <object data="/Images/vba-22-8691-are.pdf" type="application/pdf" wdith="500" height="400">
            <param name="view" value="Fit">
            <p>It appears you don't have a PDF plugin for this browser.</p>
        </object>

        <br>

        <embed type="image/jpeg" src="/Images/flowers.jpeg" width="250" height="200" />
    </section>

    <hr>

    <section>
        <h2>Graphics: Canvas and SVG</h2>
        <canvas id="myCanvas" width="200" height="200" style="border:1px solid #000;"></canvas>
        <script>
            const c = document.getElementById("myCanvas");
            const ctx = c.getContext("2d");
            ctx.fillStyle = "#FF0000"; // Red Square
            ctx.fillRect(20, 20, 150, 100);
        </script>

        <br>

        <svg width="200" height="200">
            <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
            <rect x="100" y="20" width="80" height="80" style="fill:blue;stroke:pink;stroke-width:5;opacity:0.5" />
        </svg>
    </section>

    <hr>

    <section>
        <h2>Image Map</h2>
        <img src="/Images/dollar.jpeg" alt="Clickable Map" usemap="#workmap" width="200" height="200">

        <map name="workmap">
            <area shape="circle" coords="100,115,20" href="index.html" alt="Click the pupil">
        </map>
    </section>

</main>
</body>
